name: jumeok_yori
description: 주는대로 먹는 요리 - 조건만 정하면 메뉴를 골라주는 앱
publish_to: 'none'
version: 1.1.0+6

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  provider: ^6.1.2

  # 로컬 저장소
  shared_preferences: ^2.2.3

  # 유틸
  uuid: ^4.4.0
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

  # ── Supabase 연동 ─────────────────────────────────────────
  supabase_flutter: ^2.8.4

  # .env 파일 로드 (API 키 관리)
  flutter_dotenv: ^5.2.1

  # 위치
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # 외부 앱/URL 실행 (네이버지도 등)
  url_launcher: ^6.3.1

  # 이미지 선택 (메뉴/사업자등록증)
  image_picker: ^1.1.2

  # 공유 (추천 결과 공유)
  share_plus: ^10.0.2

  # HTTP (네이버 Geocoding API 호출)
  http: ^1.2.2

  # 지도 (네이버 지도 공식 Flutter SDK)
  flutter_naver_map: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  # .env 파일을 앱 asset으로 포함
  assets:
    - .env
    - assets/images/
    - lib/legal/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo-square.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo-square.png"
